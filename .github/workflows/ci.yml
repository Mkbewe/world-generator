name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  check-branch:
    name: Validate Branch
    runs-on: ubuntu-latest
    # Fail if PR to master is NOT from develop
    if: github.event_name == 'pull_request' && github.base_ref == 'master' && github.head_ref != 'develop'

    steps:
      - name: Block non-develop branches
        run: |
          echo "❌ ERROR: Only the develop branch can be merged to master!"
          echo ""
          echo "Current source branch: ${{ github.head_ref }}"
          echo "Please merge your changes to develop first."
          exit 1

  quality:
    needs: [check-branch]
    if: always() && (needs.check-branch.result == 'success' || needs.check-branch.result == 'skipped')
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format

      - name: Build
        run: pnpm build

  test:
    needs: [check-branch]
    if: always() && (needs.check-branch.result == 'success' || needs.check-branch.result == 'skipped')
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test
