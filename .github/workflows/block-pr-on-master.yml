name: Validate PR target

on:
  pull_request:
    branches:
      - master

    types: [opened, reopened, synchronize, edited]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Prevent feature -> master
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"
          HEAD="${{ github.event.pull_request.head.ref }}"

          echo "Head: $HEAD"
          echo "Base: $BASE"

          if [[ "$BASE" == "master" && "$HEAD" == feature/* ]]; then
            echo "Feature branches must be merged into develop first."
            exit 1
          fi
